<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Particle canvas -->
  <canvas id="particle-canvas" aria-hidden="true"></canvas>

  <!-- Ambient background orbs -->
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>

  <!-- Cursor glow follower -->
  <div id="cursor-glow" aria-hidden="true"></div>

  <!-- All-done celebration overlay -->
  <div id="celebration" class="celebration hidden" aria-hidden="true">
    <canvas id="confetti-canvas"></canvas>
    <div class="celebration-msg">
      <span class="celebration-emoji">&#10024;</span>
      <p>All done. You crushed it.</p>
    </div>
  </div>

  <div class="container">
    <header class="app-header">
      <div class="header-eyebrow">
        <span class="eyebrow-dot" aria-hidden="true"></span>
        Your workspace
      </div>
      <h1 class="header-title">
        <span class="title-word title-word--1">Get</span>
        <span class="title-word title-word--2">&nbsp;it&nbsp;</span>
        <span class="title-word title-word--3">done.</span>
      </h1>
      <p class="header-sub">Stay focused. Ship it.</p>
    </header>

    <!-- Progress bar -->
    <div class="progress-shell" id="progress-shell" aria-label="Task completion progress">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="progress-label" id="progress-label">0%</span>
    </div>

    <!-- Error banner (hidden by default) -->
    <div id="error-banner" class="error-banner hidden" role="alert">
      <span class="error-icon" aria-hidden="true">&#9888;</span>
      <span class="error-text"></span>
    </div>

    <!-- Add todo form -->
    <section class="form-shell">
      <div class="form-core">
        <form id="todo-form" novalidate>
          <div class="form-row">
            <input
              id="todo-title"
              type="text"
              placeholder="What needs to be done?"
              autocomplete="off"
              required
            />
            <button type="submit" class="btn btn-add" aria-label="Add task">
              <span class="btn-text">Add</span>
              <span class="btn-icon" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="btn-ripple" aria-hidden="true"></span>
            </button>
          </div>
          <div class="form-row form-row--desc">
            <input
              id="todo-description"
              type="text"
              placeholder="Add a note&hellip;"
              autocomplete="off"
            />
          </div>
        </form>
      </div>
    </section>

    <!-- Filter tabs -->
    <nav class="filters" aria-label="Filter tasks">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Done</button>
    </nav>

    <!-- Todo list -->
    <main>
      <ul id="todo-list" aria-label="Task items"></ul>
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon" aria-hidden="true">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect x="7" y="12" width="34" height="27" rx="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M15 24h18M15 31h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M15 17h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="37" cy="11" r="5" fill="var(--accent)" opacity="0.7"/>
            <path d="M35 11l1.5 1.5L39 9" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p>Nothing here yet&mdash;<br>add your first task above.</p>
      </div>
    </main>

    <footer class="app-footer">
      <span id="remaining-count"></span>
    </footer>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
